name: 🧬 OTTO Update — Geração de Pílulas Científicas

# ══════════════════════════════════════════════════════════════════════
# Gera pílulas científicas ORL automaticamente.
# Cron: a cada 48h às 09h UTC (06h BRT).
# Manual: botão "Run workflow" no GitHub Actions UI.
# ══════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 9 */2 * *'   # dia sim dia não, 09h UTC = 06h BRT
  workflow_dispatch:
    inputs:
      count:
        description: 'Número de pílulas a gerar'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '5'
      tema:
        description: 'Área temática (vazio = aleatório)'
        required: false
        default: ''
        type: string

jobs:
  generate-pills:
    name: 🧬 Gerar Pílulas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependências (firebase-admin)
        run: npm install firebase-admin

      - name: 🧬 Gerar pílulas
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '2' }}
          TEMA="${{ github.event.inputs.tema || '' }}"

          echo "🧬 Gerando ${COUNT} pílula(s)..."

          if [ -n "$TEMA" ]; then
            node scripts/generate-pills.mjs --count "$COUNT" --tema "$TEMA"
          else
            node scripts/generate-pills.mjs --count "$COUNT"
          fi

      - name: 📊 Log de sucesso
        if: success()
        run: echo "✅ Pílulas geradas com sucesso em $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: ❌ Log de falha
        if: failure()
        run: echo "❌ Falha na geração de pílulas em $(date -u '+%Y-%m-%d %H:%M UTC')"
