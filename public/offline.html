<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Offline - HART'S OTTOs</title>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F8FBFB; color: #2C3E50; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; padding: 20px; }
    h1 { color: #1D9E75; margin-bottom: 10px; }
    p { color: #7F8C8D; line-height: 1.5; }
    .icon { width: 80px; height: 80px; background-color: #1D9E75; color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="icon">O</div>
  <h1>Você está offline</h1>
  <p>Parece que sua conexão com a internet caiu.<br>O aplicativo HART'S OTTOs precisa de conexão para carregar novos módulos.</p>
  <p style="font-size: 0.9em; margin-top: 20px;"><button onclick="window.location.reload()" style="background-color: #1D9E75; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Tentar Novamente</button></p>
</body>
</html>
